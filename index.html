<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commodity Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/charts.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1><span>📊</span> Commodity Dashboard</h1>
            <div class="updated" id="header-info">Loading...</div>
        </div>
    </header>
    <nav class="tab-bar" id="tab-bar"></nav>
    <main class="content" id="main-content">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading commodity data...</div>
        </div>
    </main>
    <footer class="footer">
        <p>Data sourced from TradingEconomics, Yahoo Finance, TradingView · Updated every 4 hours via GitHub Actions</p>
        <p><a href="https://github.com/ronysitepu/commodity-dashboard" target="_blank" rel="noopener">View on GitHub</a></p>
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
